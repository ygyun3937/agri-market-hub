name: Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── Frontend ──────────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm run build
        working-directory: frontend
        env:
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}

      # ── Backend ───────────────────────────────────────────────
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - run: |
          dotnet publish backend/AgriHub.Api/AgriHub.Api.csproj \
            -c Release -r linux-x64 --self-contained true \
            -o backend/publish

      # ── Crawler deps ──────────────────────────────────────────
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt --target .packages -q
        working-directory: crawler

      # ── SSH 키 설정 ───────────────────────────────────────────
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      # ── 서버 디렉토리 생성 ────────────────────────────────────
      - name: Create remote directories
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "
            mkdir -p ${{ secrets.DEPLOY_PATH }}/backend/publish
            mkdir -p ${{ secrets.DEPLOY_PATH }}/crawler
            mkdir -p ${{ secrets.DEPLOY_PATH }}/postgres
            mkdir -p ${{ secrets.STATIC_PATH }}
          "

      # ── .env 파일 생성 ───────────────────────────────────────
      - name: Create .env on server
        run: |
          echo "${{ secrets.ENV_FILE }}" | ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "cat > ${{ secrets.DEPLOY_PATH }}/.env"

      # ── SCP: 백엔드 + 크롤러 + compose ────────────────────────
      - name: Upload backend, crawler, compose
        run: |
          rsync -az --delete --exclude '__pycache__' --exclude '*.pyc' backend/publish/ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.DEPLOY_PATH }}/backend/publish/
          rsync -az --delete --exclude '__pycache__' --exclude '*.pyc' crawler/ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.DEPLOY_PATH }}/crawler/
          rsync -az postgres/init.sql ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.DEPLOY_PATH }}/postgres/
          scp docker-compose.yml ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.DEPLOY_PATH }}/docker-compose.yml

      # ── SCP: 프론트엔드 정적 파일 → Caddy 웹루트 ─────────────
      - name: Upload frontend static files
        run: |
          rsync -az --delete frontend/dist/ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.STATIC_PATH }}/

      # ── 서버 재시작 ───────────────────────────────────────────
      - name: Restart services
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "
            cd ${{ secrets.DEPLOY_PATH }}
            chmod +x backend/publish/AgriHub.Api
            docker compose up -d
            docker compose restart api crawler
          "

      # ── DB 마이그레이션 ───────────────────────────────────────
      - name: Run DB migration
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "
            sleep 5
            cd ${{ secrets.DEPLOY_PATH }}
            docker compose exec -T db psql -U agrihub -d agrihub -c \"ALTER TABLE users ALTER COLUMN password_hash DROP NOT NULL\"
            docker compose exec -T db psql -U agrihub -d agrihub -c \"ALTER TABLE users ADD COLUMN IF NOT EXISTS google_id VARCHAR(255)\"
            docker compose exec -T db psql -U agrihub -d agrihub -c \"ALTER TABLE users ADD COLUMN IF NOT EXISTS google_refresh_token TEXT\"
          "
