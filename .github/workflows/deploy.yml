name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]

jobs:
  build-and-deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── Frontend ──────────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm run build
        working-directory: frontend
        env:
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}

      # ── Backend ───────────────────────────────────────────────
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - run: |
          dotnet publish backend/AgriHub.Api/AgriHub.Api.csproj \
            -c Release -r linux-x64 --self-contained true \
            -o backend/publish

      # ── Crawler deps ──────────────────────────────────────────
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt --target .packages -q
        working-directory: crawler

      # ── SSH 키 설정 ───────────────────────────────────────────
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      # ── 서버 디렉토리 생성 ────────────────────────────────────
      - name: Create remote directories
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "
            mkdir -p ${{ secrets.DEPLOY_PATH }}/backend/publish
            mkdir -p ${{ secrets.DEPLOY_PATH }}/crawler
            mkdir -p ${{ secrets.DEPLOY_PATH }}/postgres
            mkdir -p ${{ secrets.STATIC_PATH }}
          "

      # ── SCP: 백엔드 + 크롤러 + compose ────────────────────────
      - name: Upload backend, crawler, compose
        run: |
          rsync -az --delete --exclude '__pycache__' --exclude '*.pyc' backend/publish/ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.DEPLOY_PATH }}/backend/publish/
          rsync -az --delete --exclude '__pycache__' --exclude '*.pyc' crawler/ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.DEPLOY_PATH }}/crawler/
          rsync -az postgres/init.sql ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.DEPLOY_PATH }}/postgres/
          scp docker-compose.yml ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.DEPLOY_PATH }}/docker-compose.yml

      # ── SCP: 프론트엔드 정적 파일 → Caddy 웹루트 ─────────────
      - name: Upload frontend static files
        run: |
          rsync -az --delete frontend/dist/ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.STATIC_PATH }}/

      # ── 서버 재시작 (.env는 /tmp에 잠깐 쓰고 즉시 삭제) ──────
      - name: Restart services
        run: |
          echo "${{ secrets.ENV_FILE }}" | ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "
            cat > /tmp/.deploy.env
            cd ${{ secrets.DEPLOY_PATH }}
            rm -f .env
            chmod +x backend/publish/AgriHub.Api
            docker compose --env-file /tmp/.deploy.env up -d
            docker compose --env-file /tmp/.deploy.env restart api crawler
            rm -f /tmp/.deploy.env
          "

      # ── DB 마이그레이션 ───────────────────────────────────────
      - name: Run DB migration
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "
            sleep 5
            cd ${{ secrets.DEPLOY_PATH }}
            docker compose exec -T db psql -U agrihub -d agrihub -c \"ALTER TABLE users ALTER COLUMN password_hash DROP NOT NULL\"
            docker compose exec -T db psql -U agrihub -d agrihub -c \"ALTER TABLE users ADD COLUMN IF NOT EXISTS google_id VARCHAR(255)\"
            docker compose exec -T db psql -U agrihub -d agrihub -c \"ALTER TABLE users ADD COLUMN IF NOT EXISTS google_refresh_token TEXT\"
            docker compose exec -T db psql -U agrihub -d agrihub -c \"CREATE TABLE IF NOT EXISTS markets (code VARCHAR(20) PRIMARY KEY, name VARCHAR(100) NOT NULL, region VARCHAR(50))\"
            docker compose exec -T db psql -U agrihub -d agrihub -c \"CREATE TABLE IF NOT EXISTS auction_raw (id SERIAL PRIMARY KEY, market_code VARCHAR(20), market_name VARCHAR(100), item_code VARCHAR(50), item_name VARCHAR(100), category VARCHAR(50), variety VARCHAR(100), origin VARCHAR(100), grade VARCHAR(20), price NUMERIC(10,0), volume NUMERIC(12,2), unit VARCHAR(20), date DATE NOT NULL, UNIQUE(market_code, item_code, variety, origin, grade, date))\"
            docker compose exec -T db psql -U agrihub -d agrihub -c \"CREATE TABLE IF NOT EXISTS daily_auction (id SERIAL PRIMARY KEY, item_code VARCHAR(50) NOT NULL, item_name VARCHAR(100), category VARCHAR(50), date DATE NOT NULL, avg_price NUMERIC(10,0), min_price NUMERIC(10,0), max_price NUMERIC(10,0), volume NUMERIC(12,0), UNIQUE(item_code, date))\"
            docker compose exec -T db psql -U agrihub -d agrihub -c \"CREATE INDEX IF NOT EXISTS idx_auction_raw_date ON auction_raw(date DESC)\"
            docker compose exec -T db psql -U agrihub -d agrihub -c \"CREATE INDEX IF NOT EXISTS idx_daily_auction_item ON daily_auction(item_code, date)\"
            docker compose exec -T db psql -U agrihub -d agrihub -c \"CREATE TABLE IF NOT EXISTS livestock_prices (id SERIAL PRIMARY KEY, item_code VARCHAR(50) NOT NULL, item_name VARCHAR(100), category VARCHAR(50), price NUMERIC(10,2), unit VARCHAR(20), date DATE NOT NULL, UNIQUE(item_code, date))\"
            docker compose exec -T db psql -U agrihub -d agrihub -c \"CREATE INDEX IF NOT EXISTS idx_livestock_date ON livestock_prices(date DESC)\"
            docker compose exec -T db psql -U agrihub -d agrihub -c \"ALTER TABLE livestock_prices ADD COLUMN IF NOT EXISTS origin VARCHAR(50) NOT NULL DEFAULT '국내산'\"
            docker compose exec -T db psql -U agrihub -d agrihub -c \"DO \\\$\\\$ BEGIN IF EXISTS (SELECT 1 FROM pg_constraint WHERE conname = 'livestock_prices_item_code_date_key') THEN ALTER TABLE livestock_prices DROP CONSTRAINT livestock_prices_item_code_date_key; END IF; END \\\$\\\$\"
            docker compose exec -T db psql -U agrihub -d agrihub -c \"ALTER TABLE livestock_prices ADD CONSTRAINT livestock_prices_item_code_origin_date_key UNIQUE (item_code, origin, date)\" || true
          "
