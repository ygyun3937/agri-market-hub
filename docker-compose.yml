services:
  api:
    image: mcr.microsoft.com/dotnet/runtime-deps:10.0
    working_dir: /app
    command: ./AgriHub.Api
    volumes:
      - ./backend/publish:/app
    ports:
      - "5031:5031"
    environment:
      - ASPNETCORE_URLS=http://+:5031
      - ConnectionStrings__Postgres=Host=db;Port=5432;Database=agrihub;Username=agrihub;Password=${DB_PASS}
      - ConnectionStrings__Redis=redis:6379
      - Jwt__Secret=${JWT_SECRET}
      - Jwt__Issuer=agrihub
      - Jwt__Audience=agrihub
      - ExternalApis__WeatherKey=${WEATHER_KEY}
      - ExternalApis__KamisKey=${KAMIS_KEY}
      - ExternalApis__NaverClientId=${NAVER_CLIENT_ID}
      - ExternalApis__NaverClientSecret=${NAVER_CLIENT_SECRET}
      - VapidPublicKey=${VAPID_PUBLIC_KEY}
      - VapidPrivateKey=${VAPID_PRIVATE_KEY}
      - Google__ClientId=${GOOGLE_CLIENT_ID}
      - Google__ClientSecret=${GOOGLE_CLIENT_SECRET}
      - Google__RedirectUri=${GOOGLE_REDIRECT_URI:-https://agri.dooyg.store/api/auth/google/callback}
      - DOTNET_GCConserveMemory=9
      - ASPNETCORE_ENVIRONMENT=Production
      - Cors__AllowedOrigins=${CORS_ORIGINS:-https://agri.dooyg.store}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  crawler:
    image: python:3.11-slim
    working_dir: /app
    command: python main.py
    volumes:
      - ./crawler:/app
    environment:
      - PYTHONPATH=/app/.packages
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=agrihub
      - DB_USER=agrihub
      - DB_PASS=${DB_PASS}
      - KAMIS_KEY=${KAMIS_KEY}
      - WEATHER_KEY=${WEATHER_KEY}
      - NAVER_CLIENT_ID=${NAVER_CLIENT_ID}
      - NAVER_CLIENT_SECRET=${NAVER_CLIENT_SECRET}
      - PEST_KEY=${PEST_KEY}
      - OPINET_KEY=${OPINET_KEY}
      - PUBLIC_DATA_API_KEY=${PUBLIC_DATA_API_KEY}
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=agrihub
      - POSTGRES_USER=agrihub
      - POSTGRES_PASSWORD=${DB_PASS}
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agrihub"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
  redis_data:
