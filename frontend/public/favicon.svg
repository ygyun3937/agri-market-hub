<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="5" fill="#0d1117"/>

  <!-- corner brackets (관제) -->
  <path d="M4 9 L4 4 L9 4" fill="none" stroke="#3fb950" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M23 4 L28 4 L28 9" fill="none" stroke="#3fb950" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M4 23 L4 28 L9 28" fill="none" stroke="#58a6ff" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M23 28 L28 28 L28 23" fill="none" stroke="#58a6ff" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- horizon divider -->
  <line x1="7" y1="17" x2="25" y2="17" stroke="#21262d" stroke-width="0.8"/>

  <!-- plant stem -->
  <line x1="16" y1="17" x2="16" y2="9" stroke="#3fb950" stroke-width="1.6" stroke-linecap="round"/>
  <!-- left leaf -->
  <path d="M16 15 C14.2 13.2 10.5 13.8 10 11 C13.2 10.4 16.2 13 16 15Z" fill="#3fb950"/>
  <!-- right leaf -->
  <path d="M16 12.5 C17.8 10.8 21.5 11.2 22 8.5 C18.8 7.8 15.8 10.5 16 12.5Z" fill="#3fb950" opacity="0.72"/>

  <!-- wave (수산) -->
  <path d="M7 21.5 Q9.5 19.2 12 21.5 Q14.5 23.8 17 21.5 Q19.5 19.2 22 21.5 Q23.5 22.8 25 21.5"
        fill="none" stroke="#58a6ff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
